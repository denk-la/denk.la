<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joe Denk - Real Estate</title>
  <meta name="description" content="Joe Denk - Real estate advisory rooted in analysis, clarity, and care. SoCal Group, eXp Realty.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;800&family=Roboto:wght@100;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-navy: #0C0F24;
      --navy-card: #161A2E;
      --charcoal-blue: #31303F;
      --orange: #E87A2E;
      --light-orange: #F5921F;
      --white: #FFFFFF;
      --light-grey: #EEEEEE;
      --frosted-blue: #91A3C9;
      --moss-grey: #686672;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--dark-navy);
      color: var(--light-grey);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      z-index: 100;
    }

    .ambient {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(140px);
      pointer-events: none;
      z-index: 0;
    }

    .ambient--orange {
      background: var(--orange);
      top: -250px;
      right: -150px;
      opacity: 0.06;
    }

    .ambient--blue {
      background: var(--frosted-blue);
      bottom: -250px;
      left: -200px;
      opacity: 0.03;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .rule {
      width: 40px;
      height: 1px;
      background-color: var(--charcoal-blue);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.2s forwards;
    }

    .name {
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      letter-spacing: -0.01em;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.4s forwards;
    }

    .descriptor {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.6s forwards;
    }

    .divider {
      width: 40px;
      height: 1px;
      background-color: var(--charcoal-blue);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.8s forwards;
    }

    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 1.0s forwards;
    }

    .contact a {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: var(--light-grey);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .contact a:hover {
      color: var(--orange);
    }

    .cta {
      display: inline-block;
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--light-grey);
      text-decoration: none;
      padding: 0.9rem 2.4rem;
      border: 1px solid var(--charcoal-blue);
      transition: all 0.35s ease;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 1.2s forwards;
    }

    .cta:hover {
      background-color: var(--orange);
      border-color: var(--orange);
      color: var(--dark-navy);
    }

    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 1.4s forwards;
    }

    .footer span {
      font-family: 'Roboto', sans-serif;
      font-weight: 100;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--moss-grey);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 1.5rem;
      }

      .cta {
        padding: 0.8rem 2rem;
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="ambient ambient--orange"></div>
  <div class="ambient ambient--blue"></div>

  <main class="page">
    <div class="rule"></div>

    <h1 class="name">Joe Denk</h1>
    <p class="descriptor">Realtor&#174;</p>

    <div class="divider"></div>

    <div class="contact">
      <a href="tel:6266999884">626.699.9884</a>
      <a href="mailto:hello&#64;denk.la">hello&#64;denk.la</a>
    </div>

    <a href="mailto:hello&#64;denk.la" class="cta">Get in Touch</a>

    <footer class="footer">
      <span>SoCal Group &#160;|&#160; eXp Realty</span>
      <span>DRE #02283609</span>
    </footer>
  </main>
</body>
</html>
